<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DrawBattle - Real-time multiplayer drawing and guessing game. Draw, guess, and battle with friends online!">
  <meta name="theme-color" content="#7F5AF0">
  <title>DrawBattle | Real-Time Drawing & Guessing Game</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body>
  <!-- Background Effects -->
  <div class="bg-effects">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>
  <div class="bg-grid"></div>

  <!-- Auth Page -->
  <div class="page-container auth-page">
    <div class="auth-card glass">
      
      <!-- Logo -->
      <div class="auth-logo">
        <div class="auth-logo-icon">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
            <path d="M2 2l7.586 7.586"/>
            <circle cx="11" cy="11" r="2"/>
          </svg>
        </div>
        <h1 class="gradient-text">DRAWBATTLE</h1>
        <p>Draw, Guess & Have Fun!</p>
      </div>

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
          </svg>
          Sign In
        </button>
        <button class="auth-tab" id="registerTab" onclick="switchTab('register')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4-4v2"/>
            <circle cx="8.5" cy="7" r="4"/>
            <line x1="20" y1="8" x2="20" y2="14"/>
            <line x1="23" y1="11" x2="17" y2="11"/>
          </svg>
          Sign Up
        </button>
      </div>

      <!-- Error -->
      <div class="auth-error hidden" id="authError"></div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm" onsubmit="handleLogin(event)">
        <div class="input-group">
          <label for="loginUsername">Username</label>
          <input type="text" class="input" id="loginUsername" placeholder="Enter your username" required minlength="3" maxlength="20" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="loginPassword">Password</label>
          <div class="input-with-icon">
            <input type="password" class="input" id="loginPassword" placeholder="Enter your password" required minlength="6" autocomplete="current-password">
            <button type="button" class="input-icon-btn" onclick="togglePassword('loginPassword', this)" title="Toggle password visibility" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-glow btn-lg" id="loginBtn">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="registerForm" onsubmit="handleRegister(event)">
        <div class="input-group">
          <label for="regUsername">Username</label>
          <input type="text" class="input" id="regUsername" placeholder="Choose a username" required minlength="3" maxlength="20" autocomplete="username">
        </div>
        <div class="input-group">
          <label for="regPassword">Password</label>
          <div class="input-with-icon">
            <input type="password" class="input" id="regPassword" placeholder="Create a password (min 6 chars)" required minlength="6" autocomplete="new-password">
            <button type="button" class="input-icon-btn" onclick="togglePassword('regPassword', this)" title="Toggle password visibility" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="input-group">
          <label for="regConfirm">Confirm Password</label>
          <div class="input-with-icon">
            <input type="password" class="input" id="regConfirm" placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
            <button type="button" class="input-icon-btn" onclick="togglePassword('regConfirm', this)" title="Toggle password visibility" aria-label="Toggle password visibility">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-glow btn-lg" id="registerBtn">
          <span>Create Account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or continue as</span>
      </div>
      <button class="guest-btn" onclick="handleGuest()">
        👾 Play as Guest
      </button>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
