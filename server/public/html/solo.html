<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DrawBattle - Solo Draw</title>  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎨</text></svg>">
</head>
<body class="ppt-body">

  <!-- PowerPoint-style App Shell -->
  <div class="ppt-app">

    <!-- ── Title Bar ── -->
    <div class="ppt-titlebar">
      <button class="ppt-back-btn" onclick="window.location.href='/home.html'" title="Back to Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Back
      </button>
      <div class="ppt-title">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
        </svg>
        Solo Draw Mode
      </div>
      <div class="ppt-titlebar-right">
        <span class="ppt-status-badge" id="predictionStatus">🎨 Ready to draw</span>
      </div>
    </div>

    <!-- ── Ribbon ── -->
    <div class="ppt-ribbon">

      <!-- Group: Draw Tools -->
      <div class="ribbon-group">
        <div class="ribbon-tools">
          <button class="ribbon-tool active" data-tool="pen" onclick="selectTool('pen')" title="Pen — solid stroke">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l7.586 7.586"/>
            </svg>
            <span>Pen</span>
          </button>
          <button class="ribbon-tool" data-tool="pencil" onclick="selectTool('pencil')" title="Pencil — light stroke">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
            </svg>
            <span>Pencil</span>
          </button>
          <button class="ribbon-tool" data-tool="highlighter" onclick="selectTool('highlighter')" title="Highlighter — wide transparent">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3-3 8.5 8.5-3 3L9 11z"/><path d="M2 22l5-5"/>
            </svg>
            <span>Highlight</span>
          </button>
        </div>
        <div class="ribbon-group-label">Draw</div>
      </div>

      <div class="ribbon-divider"></div>

      <!-- Group: Edit -->
      <div class="ribbon-group">
        <div class="ribbon-tools">
          <button class="ribbon-tool" data-tool="eraser" onclick="selectTool('eraser')" title="Eraser">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 20H7L3 16l10-10 7 7-3 3H20z"/><path d="M6.5 17.5l4-4"/>
            </svg>
            <span>Eraser</span>
          </button>
          <button class="ribbon-tool ribbon-tool-danger" onclick="clearSoloCanvas()" title="Undo last stroke">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>
            </svg>
            <span>Undo</span>
          </button>
        </div>
        <div class="ribbon-group-label">Edit</div>
      </div>

      <div class="ribbon-divider"></div>

      <!-- Group: Thickness -->
      <div class="ribbon-group">
        <div class="ribbon-tools">
          <button class="ribbon-tool ribbon-size-btn" data-size="2" onclick="selectSoloBrushSize(2)" title="1pt">
            <div class="size-preview"><div class="size-dot size-dot-1"></div></div>
            <span>1pt</span>
          </button>
          <button class="ribbon-tool ribbon-size-btn" data-size="4" onclick="selectSoloBrushSize(4)" title="2pt">
            <div class="size-preview"><div class="size-dot size-dot-2"></div></div>
            <span>2pt</span>
          </button>
          <button class="ribbon-tool ribbon-size-btn ribbon-size-active" data-size="8" onclick="selectSoloBrushSize(8)" title="4pt">
            <div class="size-preview"><div class="size-dot size-dot-3"></div></div>
            <span>4pt</span>
          </button>
          <button class="ribbon-tool ribbon-size-btn" data-size="16" onclick="selectSoloBrushSize(16)" title="8pt">
            <div class="size-preview"><div class="size-dot size-dot-4"></div></div>
            <span>8pt</span>
          </button>
          <button class="ribbon-tool ribbon-size-btn" data-size="28" onclick="selectSoloBrushSize(28)" title="14pt">
            <div class="size-preview"><div class="size-dot size-dot-5"></div></div>
            <span>14pt</span>
          </button>
        </div>
        <div class="ribbon-group-label">Thickness</div>
      </div>

      <div class="ribbon-divider"></div>

      <!-- Group: Colors -->
      <div class="ribbon-group ribbon-group-colors">
        <div class="ribbon-tools">
          <div class="ribbon-color-preview-wrap">
            <div class="ribbon-color-preview" id="currentColorPreview" title="Current color"></div>
            <span class="ribbon-color-label">Color</span>
          </div>
          <div class="ribbon-color-swatches">
            <button class="swatch-btn active" data-color="#222222" onclick="selectSoloColor(this)" title="Black"></button>
            <button class="swatch-btn" data-color="#FFFFFF" onclick="selectSoloColor(this)" title="White"></button>
            <button class="swatch-btn" data-color="#9E9E9E" onclick="selectSoloColor(this)" title="Gray"></button>
            <button class="swatch-btn" data-color="#607D8B" onclick="selectSoloColor(this)" title="Blue Gray"></button>
            <button class="swatch-btn" data-color="#795548" onclick="selectSoloColor(this)" title="Brown"></button>
            <button class="swatch-btn" data-color="#FF1744" onclick="selectSoloColor(this)" title="Red"></button>
            <button class="swatch-btn" data-color="#FF6B6B" onclick="selectSoloColor(this)" title="Light Red"></button>
            <button class="swatch-btn" data-color="#F50057" onclick="selectSoloColor(this)" title="Pink"></button>
            <button class="swatch-btn" data-color="#FF80AB" onclick="selectSoloColor(this)" title="Light Pink"></button>
            <button class="swatch-btn" data-color="#E91E63" onclick="selectSoloColor(this)" title="Hot Pink"></button>
            <button class="swatch-btn" data-color="#D500F9" onclick="selectSoloColor(this)" title="Purple"></button>
            <button class="swatch-btn" data-color="#651FFF" onclick="selectSoloColor(this)" title="Deep Purple"></button>
            <button class="swatch-btn" data-color="#3F51B5" onclick="selectSoloColor(this)" title="Indigo"></button>
            <button class="swatch-btn" data-color="#2979F3" onclick="selectSoloColor(this)" title="Blue"></button>
            <button class="swatch-btn" data-color="#00B0FF" onclick="selectSoloColor(this)" title="Light Blue"></button>
            <button class="swatch-btn" data-color="#00E5FF" onclick="selectSoloColor(this)" title="Cyan"></button>
            <button class="swatch-btn" data-color="#009688" onclick="selectSoloColor(this)" title="Teal"></button>
            <button class="swatch-btn" data-color="#00C853" onclick="selectSoloColor(this)" title="Green"></button>
            <button class="swatch-btn" data-color="#8BC34A" onclick="selectSoloColor(this)" title="Light Green"></button>
            <button class="swatch-btn" data-color="#64DD17" onclick="selectSoloColor(this)" title="Lime"></button>
            <button class="swatch-btn" data-color="#FFD600" onclick="selectSoloColor(this)" title="Yellow"></button>
            <button class="swatch-btn" data-color="#FFC107" onclick="selectSoloColor(this)" title="Gold"></button>
            <button class="swatch-btn" data-color="#FF9800" onclick="selectSoloColor(this)" title="Orange"></button>
            <button class="swatch-btn" data-color="#FF5722" onclick="selectSoloColor(this)" title="Deep Orange"></button>
            <button class="swatch-btn" data-color="#FF6D00" onclick="selectSoloColor(this)" title="Dark Orange"></button>
            <button class="swatch-btn" data-color="#BCAAA4" onclick="selectSoloColor(this)" title="Warm Gray"></button>
            <button class="swatch-btn" data-color="#004D40" onclick="selectSoloColor(this)" title="Dark Teal"></button>
            <button class="swatch-btn" data-color="#1A237E" onclick="selectSoloColor(this)" title="Dark Blue"></button>
          </div>
        </div>
        <div class="ribbon-group-label">Colors</div>
      </div>

      <div class="ribbon-divider"></div>

      <!-- Group: Actions -->
      <div class="ribbon-group">
        <div class="ribbon-tools">
          <button class="ribbon-tool ribbon-tool-primary" onclick="submitSoloDrawing()" title="AI Predict">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span>Submit</span>
          </button>
          <button class="ribbon-tool" onclick="newSoloDrawing()" title="New drawing">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
            </svg>
            <span>New</span>
          </button>
        </div>
        <div class="ribbon-group-label">Actions</div>
      </div>

    </div><!-- /ribbon -->

    <!-- ── Main Work Area ── -->
    <div class="ppt-main">

      <!-- Slide Canvas Area -->
      <div class="ppt-slide-area">
        <div class="ppt-slide-shadow">
          <canvas id="soloCanvas" class="ppt-canvas"></canvas>
        </div>
      </div>

      <!-- Right Side Panel -->
      <div class="ppt-side-panel">

        <div class="ppt-panel-card">
          <div class="ppt-panel-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            AI Prediction
          </div>
          <div class="ppt-prediction-top">
            <div class="ppt-prediction-label">Top Guess</div>
            <div class="ppt-prediction-result" id="topGuess">—</div>
            <div class="ppt-prediction-conf" id="topConfidence">—</div>
          </div>
          <div class="ppt-prediction-list" id="predictionsList">
            <div class="ppt-prediction-empty">Start drawing!</div>
          </div>
        </div>

        <div class="ppt-panel-card ppt-stats-card">
          <div class="ppt-stat">
            <span class="ppt-stat-label">Status</span>
            <span class="ppt-stat-val" id="drawingStatus">Ready</span>
          </div>
          <div class="ppt-stat">
            <span class="ppt-stat-label">Strokes</span>
            <span class="ppt-stat-val" id="strokeCount">0</span>
          </div>
        </div>

      </div>
    </div>

  </div><!-- /ppt-app -->

  <div id="soloLoadingOverlay" class="loading-overlay hidden">
    <div class="spinner"></div>
    <p id="loadingText">Loading AI Model...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.0"></script>
  <script src="/js/solo.js"></script>
</body>
</html>
