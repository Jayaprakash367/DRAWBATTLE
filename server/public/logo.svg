<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80">
  <defs>
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7F5AF0;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E040FB;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00D9FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E040FB;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Icon Circle Background -->
  <rect x="5" y="10" width="60" height="60" rx="12" fill="url(#mainGradient)" opacity="0.15" stroke="url(#mainGradient)" stroke-width="1.5"/>
  
  <!-- Paintbrush (Left) -->
  <g>
    <rect x="18" y="28" width="8" height="35" rx="4" fill="#FF6B9D" opacity="0.9"/>
    <ellipse cx="22" cy="28" rx="7.5" ry="6" fill="#FF6B9D"/>
    <path d="M 18 24 L 22 16 L 26 24 Z" fill="#FF6B9D" opacity="0.8"/>
  </g>
  
  <!-- Pencil (Right) -->
  <g>
    <rect x="44" y="26" width="8" height="38" rx="4" fill="#FFD700"/>
    <polygon points="48,64 44,72 52,72" fill="#D4AF37"/>
    <path d="M 48 68 Q 35 55 30 45" stroke="#E040FB" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Battle Spark/Lightning (Center) -->
  <g stroke="url(#mainGradient)" stroke-width="2" fill="none" filter="url(#glow)">
    <path d="M 35 32 L 38 38 L 35 40 L 40 48 L 32 50 L 36 58"/>
    <circle cx="35" cy="45" r="3" fill="url(#mainGradient)" opacity="0.6"/>
  </g>
  
  <!-- Text: DRAWBATTLE -->
  <text x="75" y="45" font-family="'Orbitron', 'Arial Black', sans-serif" font-size="24" font-weight="700" fill="url(#textGradient)" letter-spacing="2">
    DRAWBATTLE
  </text>
  
  <!-- Tagline -->
  <text x="75" y="62" font-family="'Inter', sans-serif" font-size="11" fill="#94A3B8" letter-spacing="1">
    Draw • Guess • Battle
  </text>
  
  <!-- Decorative accent line -->
  <line x1="75" y1="68" x2="300" y2="68" stroke="url(#textGradient)" stroke-width="1" opacity="0.3"/>
</svg>
